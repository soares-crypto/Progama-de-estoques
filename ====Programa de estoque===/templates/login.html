<!DOCTYPE html>
<html>
<head>
    <title>Login - StockMaster</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e1e1e; padding: 40px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 300px; }
        input { display: block; margin: 15px auto; padding: 12px; width: 100%; border-radius: 5px; border: 1px solid #444; background: #2d2d2d; color: white; }
        button { padding: 12px; width: 100%; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: #3498db;">📦 StockMaster</h2>
        <p>Acesso Restrito</p>
        <form method="POST">
            <input type="text" name="usuario" placeholder="Usuário" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">ENTRAR</button>
        </form>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <p style="color: #e74c3c; font-size: 14px;">{{ message }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}
    </div>
</body>
</html>
